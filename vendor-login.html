<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vendor Login - Balut Business</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow">
          <div class="card-header bg-success text-white text-center">
            <h4>Vendor Login</h4>
          </div>
          <div class="card-body">
            <form action="/vendor-login" method="POST">
              <div class="mb-3">
                <label for="vendorUsername" class="form-label">Username</label>
                <input type="text" class="form-control" id="vendorUsername" name="username" required>
              </div>
              <div class="mb-3">
                <label for="vendorPassword" class="form-label">Password</label>
                <input type="password" class="form-control" id="vendorPassword" name="password" required>
              </div>
              <button type="submit" class="btn btn-success w-100">Login as Vendor</button>
            </form>
          </div>
          <div class="card-footer text-center text-muted small">
            Vendor access only. Contact admin for credentials.
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
