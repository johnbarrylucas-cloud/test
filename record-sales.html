<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Record Sales</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
      <a class="navbar-brand" href="index.html">Balut Business</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="manage-ducks.html">Manage Ducks</a></li>
          <li class="nav-item"><a class="nav-link" href="feed-calculator.html">Feed Calculator</a></li>
          <li class="nav-item"><a class="nav-link active" href="record-sales.html">Record Sales</a></li>
          <li class="nav-item"><a class="nav-link" href="incubator.html">Incubator</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <header class="bg-light p-4 text-center">
    <h2>💰 Record Sales</h2>
    <p class="lead">Log vendor and staff sales transactions</p>
  </header>

  <main class="container my-5">
    <!-- Sales Entry Form -->
    <div class="card">
      <div class="card-header bg-success text-white">Sales Entry</div>
      <div class="card-body">
        <form>
          <div class="row g-3">
            <div class="col-md-6">
              <label for="vendorName" class="form-label">Vendor/Staff Name</label>
              <input type="text" class="form-control" id="vendorName" placeholder="Enter name">
            </div>
            <div class="col-md-6">
              <label for="itemSold" class="form-label">Item Sold</label>
              <input type="text" class="form-control" id="itemSold" placeholder="e.g., 50 balut eggs">
            </div>
            <div class="col-md-6">
              <label for="saleAmount" class="form-label">Amount (₱)</label>
              <input type="number" class="form-control" id="saleAmount" placeholder="Enter amount">
            </div>
            <div class="col-md-6 d-flex align-items-end">
              <button type="submit" class="btn btn-outline-success w-100">Submit Sale</button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <!-- Sales Graphs -->
    <div class="card mt-4">
      <div class="card-header bg-success text-white">📊 Sales Graph</div>
      <div class="card-body">
        <ul class="nav nav-tabs mb-3" id="salesGraphTabs" role="tablist">
          <li class="nav-item" role="presentation">
            <button class="nav-link active" id="daily-tab" data-bs-toggle="tab" data-bs-target="#daily" type="button" role="tab">Daily</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="weekly-tab" data-bs-toggle="tab" data-bs-target="#weekly" type="button" role="tab">Weekly</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="monthly-tab" data-bs-toggle="tab" data-bs-target="#monthly" type="button" role="tab">Monthly</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="bi-year-tab" data-bs-toggle="tab" data-bs-target="#bi-year" type="button" role="tab">Bi-Yearly</button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" id="yearly-tab" data-bs-toggle="tab" data-bs-target="#yearly" type="button" role="tab">Yearly</button>
          </li>
        </ul>

        <div class="tab-content" id="salesGraphContent">
          <div class="tab-pane fade show active text-center p-4 bg-light border rounded" id="daily" role="tabpanel">
            <canvas id="dailyChart" width="600" height="300"></canvas>
          </div>
          <div class="tab-pane fade text-center p-4 bg-light border rounded" id="weekly" role="tabpanel">
            <canvas id="weeklyChart" width="600" height="300"></canvas>
          </div>
          <div class="tab-pane fade text-center p-4 bg-light border rounded" id="monthly" role="tabpanel">
            <canvas id="monthlyChart" width="600" height="300"></canvas>
          </div>
          <div class="tab-pane fade text-center p-4 bg-light border rounded" id="bi-year" role="tabpanel">
            <canvas id="biYearChart" width="600" height="300"></canvas>
          </div>
          <div class="tab-pane fade text-center p-4 bg-light border rounded" id="yearly" role="tabpanel">
            <canvas id="yearlyChart" width="600" height="300"></canvas>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<script>
  const chartConfig = (labels, data, label) => ({
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: label,
        data: data,
        backgroundColor: 'rgba(25,135,84,0.6)',
        borderColor: 'rgba(25,135,84,1)',
        borderWidth: 1
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { beginAtZero: true }
      }
    }
  });

  const charts = {};

  function renderChart(id, labels, data, label) {
    if (!charts[id]) {
      const ctx = document.getElementById(id);
      charts[id] = new Chart(ctx, chartConfig(labels, data, label));
    }
  }

  // Render daily chart immediately
  renderChart('dailyChart',
    ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
    [120, 150, 100, 180, 90, 200, 170],
    'Daily Sales (₱)'
  );

  // Render others on tab activation
  document.querySelectorAll('button[data-bs-toggle="tab"]').forEach(tab => {
    tab.addEventListener('shown.bs.tab', function (e) {
      const targetId = e.target.getAttribute('data-bs-target');
      switch (targetId) {
        case '#weekly':
          renderChart('weeklyChart',
            ['Week 1', 'Week 2', 'Week 3', 'Week 4'],
            [800, 950, 700, 1100],
            'Weekly Sales (₱)'
          );
          break;
        case '#monthly':
          renderChart('monthlyChart',
            ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
            [3200, 2900, 4100, 3800, 4500, 4700],
            'Monthly Sales (₱)'
          );
          break;
        case '#bi-year':
          renderChart('biYearChart',
            ['H1', 'H2'],
            [22000, 25000],
            'Bi-Yearly Sales (₱)'
          );
          break;
        case '#yearly':
          renderChart('yearlyChart',
            ['2021', '2022', '2023', '2024', '2025'],
            [40000, 48000, 52000, 60000, 58000],
            'Yearly Sales (₱)'
          );
          break;
      }
    });
  });
</script>
